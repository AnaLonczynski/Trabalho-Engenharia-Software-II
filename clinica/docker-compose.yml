version: '3.8'

services:
  # 1. Banco de Dados
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinica_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend (Java)
  backend:
    build: 
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/clinica_db
      - SPRING_DATASOURCE_USERNAME=clinica_user
      - SPRING_DATASOURCE_PASSWORD=clinica_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  # 3. Frontend (React)
  frontend:
    build: 
      context: ./frontend/clinica-frontend
    ports:
      - "5173:80" 
    depends_on:
      - backend

volumes:
  pgdata: